<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="140" y1="116" x2="860" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f5f7"/>
      <stop offset="0.52" stop-color="#dde0e5"/>
      <stop offset="1" stop-color="#bcc1c9"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(376 254) rotate(39) scale(544 448)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="backCard" x1="250" y1="250" x2="624" y2="694" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#737983"/>
      <stop offset="1" stop-color="#434851"/>
    </linearGradient>
    <linearGradient id="frontCard" x1="480" y1="336" x2="734" y2="702" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f8fa"/>
      <stop offset="1" stop-color="#d6dae0"/>
    </linearGradient>
    <linearGradient id="mutedLine" x1="316" y1="438" x2="510" y2="438" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cbd0d7"/>
      <stop offset="1" stop-color="#8b929b"/>
    </linearGradient>
    <linearGradient id="activeLine" x1="516" y1="520" x2="670" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#79808a"/>
      <stop offset="1" stop-color="#464b53"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#6a7078" flood-opacity="0.22"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="18" flood-color="#444a52" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="none" stroke="#ffffff" stroke-opacity="0.56" stroke-width="4"/>
  <ellipse cx="412" cy="274" rx="364" ry="232" fill="url(#sheen)"/>

  <g filter="url(#cardShadow)">
    <rect x="276" y="292" width="292" height="388" rx="86" fill="url(#backCard)" transform="rotate(-6 422 486)"/>
    <circle cx="380" cy="412" r="28" fill="#d6dae0"/>
    <rect x="336" y="470" width="174" height="38" rx="19" fill="url(#mutedLine)" transform="rotate(-6 423 489)"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="456" y="334" width="286" height="354" rx="82" fill="url(#frontCard)" transform="rotate(5 599 511)"/>
    <rect x="454" y="332" width="286" height="354" rx="82" fill="none" stroke="#ffffff" stroke-opacity="0.56" stroke-width="4" transform="rotate(5 597 509)"/>
    <circle cx="650" cy="434" r="28" fill="#4d535b"/>
    <rect x="520" y="502" width="150" height="38" rx="19" fill="url(#activeLine)" transform="rotate(5 595 521)"/>
  </g>
</svg>
