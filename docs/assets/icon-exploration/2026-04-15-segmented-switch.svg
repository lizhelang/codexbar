<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="140" y1="116" x2="860" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f5f7"/>
      <stop offset="0.52" stop-color="#dde0e5"/>
      <stop offset="1" stop-color="#bcc1c9"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(376 254) rotate(39) scale(544 448)">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="track" x1="200" y1="396" x2="824" y2="628" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6c727c"/>
      <stop offset="1" stop-color="#40454d"/>
    </linearGradient>
    <linearGradient id="selector" x1="484" y1="418" x2="804" y2="608" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7f8fa"/>
      <stop offset="1" stop-color="#d2d7de"/>
    </linearGradient>
    <filter id="shadow" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#6a7078" flood-opacity="0.22"/>
    </filter>
    <filter id="trackShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#4d535c" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="64" y="64" width="896" height="896" rx="220" fill="none" stroke="#ffffff" stroke-opacity="0.56" stroke-width="4"/>
  <ellipse cx="412" cy="274" rx="364" ry="232" fill="url(#sheen)"/>

  <g filter="url(#trackShadow)">
    <rect x="198" y="392" width="628" height="240" rx="120" fill="url(#track)"/>
    <rect x="198" y="392" width="628" height="240" rx="120" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="4"/>
    <rect x="474" y="418" width="324" height="188" rx="94" fill="url(#selector)"/>
    <rect x="474" y="418" width="324" height="188" rx="94" fill="none" stroke="#ffffff" stroke-opacity="0.62" stroke-width="4"/>
    <circle cx="336" cy="512" r="30" fill="#cfd4db"/>
    <circle cx="638" cy="512" r="30" fill="#48505a"/>
  </g>
</svg>
